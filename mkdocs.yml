site_name: Instrumation
site_description: A high-level Hardware Abstraction Layer (HAL) for RF test stations.
site_url: https://abduznik.github.io/instrumation/
repo_url: https://github.com/abduznik/instrumation
repo_name: abduznik/instrumation
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python: {}

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting_started/installation.md
      - Quick Start: getting_started/quickstart.md
  - User Guide:
      - Hardware Connection: user_guide/hardware.md
      - Simulation (Digital Twins): user_guide/simulation.md
      - Asynchronous Measurements: user_guide/async.md
      - Golden Master (Record/Replay): user_guide/golden_master.md
      - Unified Exceptions: user_guide/exceptions.md
      - Complex Data & Multi-Channel: user_guide/complex_data.md
      - Virtual Front Panel (VFP): user_guide/vfp.md
      - Examples & Showcases:
          - Basic Scripting: examples/basic_scripting.md
          - Async Parallelism: examples/async_parallel.md
          - Signal Sequencing: examples/sg_sequencing.md
          - Robust Error Handling: examples/error_handling.md
          - VNA Complex Traces: examples/vna_complex.md
          - Live VFP Dashboard: examples/vfp_dashboard.md
          - Data Analysis & Plotting: examples/plotting_and_data.md
          - Recording to Plot: examples/recording_to_plot.md
  - CLI Tool:
      - Overview: cli/overview.md
      - Scanning & Discovery: cli/scanning.md
      - Measuring Hardware: cli/measuring.md
      - Record & Replay: cli/recording.md
  - API Reference: api_ref/index.md
  - Development Logs:
      - Overview: logs/index.md
      - 2026-05-01:
          - Binary Optimization: logs/2026-05-01/binary_optimization.md
          - Async & Latency Fixes: logs/2026-05-01/async_latency_fix.md
          - HAL Unification: logs/2026-05-01/hal_standardization.md
          - Test Bench Modernization: logs/2026-05-01/modern_test_bench.md
          - Base Driver Restoration: logs/2026-05-01/base_driver_restoration.md
          - MeasurementResult Upgrades: logs/2026-05-01/measurement_result_upgrade.md
          - VNAs & Telemetry: logs/2026-05-01/vna_telemetry_features.md
          - Squashing VNA Bugs: logs/2026-05-01/vna_fixes.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
